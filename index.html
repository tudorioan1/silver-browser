#index.html
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Silver Browser | Minimalist & Private</title>
    <style>
        :root {
            --bg-color: #0d1117;
            --card-bg: #161b22;
            --accent-color: #58a6ff;
            --text-main: #c9d1d9;
            --text-dim: #8b949e;
            --border-color: #30363d;
            --success-color: #238636;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            overflow-x: hidden;
        }

        .container {
            max-width: 600px;
            padding: 50px 30px;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
            position: relative;
            z-index: 1;
        }

        h1 {
            font-size: 2.8rem;
            margin-bottom: 15px;
            color: #ffffff;
            letter-spacing: -1px;
        }

        p {
            font-size: 1.15rem;
            color: var(--text-dim);
            line-height: 1.6;
            margin-bottom: 40px;
        }

        .download-btn {
            display: inline-block;
            background-color: var(--success-color);
            color: #ffffff;
            padding: 16px 40px;
            font-size: 1.2rem;
            font-weight: 600;
            text-decoration: none;
            border-radius: 8px;
            transition: all 0.2s ease;
            border: 1px solid rgba(240,246,252,0.1);
        }

        .download-btn:hover {
            background-color: #2ea043;
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(46, 160, 67, 0.4);
        }

        .download-btn:active {
            transform: translateY(0);
        }

        footer {
            margin-top: 60px;
            font-size: 0.9rem;
            color: var(--text-dim);
            z-index: 1;
        }

        footer a {
            color: var(--accent-color);
            text-decoration: none;
            font-weight: 500;
        }

        footer a:hover {
            text-decoration: underline;
        }

        /* Subtle glow to match your PC vibe */
        .glow {
            width: 400px;
            height: 400px;
            background: var(--accent-color);
            filter: blur(150px);
            position: absolute;
            z-index: 0;
            opacity: 0.08;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }
    </style>
</head>
<body>
    <div class="glow"></div>
    <div class="container">
        <h1>Silver Browser</h1>
        <p>A minimalist, fast, and privacy-focused web browser. Built for power users who demand control and speed without the telemetry bloat.</p>
        
        <a href="https://github.com/tudorioan1/silver-browser/releases/download/browser/Silver.Browser.exe" class="download-btn">
            Download Silver Browser
        </a>
    </div>

    <footer>
        Made by <strong>Tudor Ioan</strong> | 
        <a href="https://github.com/tudorioan1" target="_blank">tudorioan1 on GitHub</a>
    </footer>
</body>
</html>
